name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller telethon openpyxl

      - run: pyinstaller --onefile --windowed main.py

      - uses: actions/upload-artifact@v4
        with:
          name: exe-file
          path: dist/*
